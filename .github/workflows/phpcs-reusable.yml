name: PHPCS (WPCS)

on:
  workflow_call:
    inputs:
      php_version:
        type: string
        default: "8.2"
      standards_ref:
        type: string
        default: "main"
      base_branch:
        type: string
        default: "develop"
      scan_path:
        type: string
        default: "."

permissions:
  contents: read

jobs:
  phpcs:
    name: PHPCS (WPCS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer install --no-interaction --no-progress --prefer-dist

      - name: Download central phpcs.xml (no checkout, no copy)
        run: |
          mkdir -p /tmp/aiwos-phpcs
          curl -fsSL \
            -o /tmp/aiwos-phpcs/phpcs.xml \
            https://raw.githubusercontent.com/aiwos/.github/${{ inputs.standards_ref }}/phpcs.xml

      - name: Build PHPCS ruleset (central + optional local)
        shell: bash
        run: |
          set -euo pipefail

          CENTRAL="/tmp/aiwos-phpcs/phpcs.xml"
          WRAPPER="/tmp/aiwos-phpcs/wrapper.xml"

          # Detect common local ruleset filenames (first match wins)
          LOCAL=""
          for f in phpcs.xml .phpcs.xml phpcs.xml.dist .phpcs.xml.dist; do
            if [ -f "$f" ]; then
              LOCAL="$f"
              break
            fi
          done

          if [ -n "$LOCAL" ]; then
            echo "Local PHPCS ruleset detected: $LOCAL"
            printf '%s\n' \
              '<?xml version="1.0"?>' \
              '<ruleset name="AIWOS Wrapper (Central + Local)">' \
              '  <description>Central AIWOS standards + repository local additions.</description>' \
              "  <rule ref=\"$CENTRAL\"/>" \
              "  <rule ref=\"$LOCAL\"/>" \
              '</ruleset>' \
              > "$WRAPPER"
          else
            echo "No local PHPCS ruleset detected; using central only."
            printf '%s\n' \
              '<?xml version="1.0"?>' \
              '<ruleset name="AIWOS Wrapper (Central)">' \
              '  <description>Central AIWOS standards.</description>' \
              "  <rule ref=\"$CENTRAL\"/>" \
              '</ruleset>' \
              > "$WRAPPER"
          fi

          echo "--- wrapper.xml ---"
          cat "$WRAPPER"

      - name: Show installed coding standards
        run: vendor/bin/phpcs -i

      - name: Run PHPCS
        run: |
          vendor/bin/phpcs --standard=/tmp/aiwos-phpcs/wrapper.xml ${{ inputs.scan_path }}
