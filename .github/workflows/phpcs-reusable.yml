name: PHPCS (WPCS)

on:
  workflow_call:
    inputs:
      php_version:
        type: string
        default: "8.2"
      standards_ref:
        type: string
        default: "main"
      base_branch:
        type: string
        default: "develop"
      scan_path:
        type: string
        default: "."

permissions:
  contents: read

jobs:
  phpcs:
    name: PHPCS (WPCS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer install --no-interaction --no-progress --prefer-dist

      - name: Download central phpcs.xml
        run: |
          mkdir -p /tmp/aiwos-phpcs
          curl -fsSL \
            -o /tmp/aiwos-phpcs/phpcs.xml \
            https://raw.githubusercontent.com/aiwos/.github/${{ inputs.standards_ref }}/phpcs.xml

      - name: Show installed coding standards
        run: vendor/bin/phpcs -i

      - name: Run PHPCS (central ruleset only)
        run: |
          vendor/bin/phpcs \
            --standard=/tmp/aiwos-phpcs/phpcs.xml \
            ${{ inputs.scan_path }}
